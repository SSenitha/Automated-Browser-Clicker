<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial; padding: 10px; width: 200px; }
    input { width: 80px; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h3>Auto Clicker</h3>
  <!-- Input for first click-->
  X: <input type="number" id="x"><br>
  Y: <input type="number" id="y"><br>
  Interval (ms): <input type="number" id="interval"><br><br>
  
  <!-- Input for second click-->
  X: <input type="number" id="x2"><br>
  Y: <input type="number" id="y2"><br>
  Interval (ms): <input type="number" id="interval2"><br>

  <!-- Buttons for Start and Stop -->
  <button id="start">Start</button>
  <button id="stop">Stop</button>

  <script src="popup.js"></script>
</body>
</html>
