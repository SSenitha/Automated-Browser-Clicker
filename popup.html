<!doctype html>
<html>
  
  <head>
    <link rel="stylesheet" href="popup.css">
  </head>

  <body>
    <div class="container">
      <h3>Auto Clicker 1.0</h3>

      <I>First Click Position (Alt+1)</I><br><br>
      <!-- Input for first click-->
      X: <span type="number" id="x"></span>
      Y: <span type="number" id="y"></span><br />
      <!-- Interval values has to move to JS-->
      Interval (ms): <input class="interval" type="number" id="interval" value="1000"/><br /><br />

      <I>Second Click Position (Alt+2)</I><br><br>
      <!-- Input for second click-->
      X: <span type="number" id="x2"></span>
      Y: <span type="number" id="y2"></span><br />
      <!-- Interval values has to move to JS-->
      Interval (ms): <input class="interval" type="number" id="interval2" value="1000" /><br />

      <div class = "buttons">
        <!-- Buttons for Start and Stop -->
        <button id="start">Start</button>
        <button id="stop">Stop</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
